<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Hellox Architecture</title>
  <desc id="desc">High-level architecture showing CLI, gateway, agent runtime, tools, storage, and optional local integrations.</desc>
  <rect width="960" height="560" rx="24" fill="#f8fafc"/>
  <g font-family="Segoe UI, system-ui, sans-serif">
    <rect x="60" y="54" width="840" height="64" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="480" y="93" text-anchor="middle" font-size="28" font-weight="700" fill="#1e3a8a">Hellox CLI / REPL / TUI</text>
    <rect x="90" y="168" width="240" height="118" rx="18" fill="#dcfce7" stroke="#86efac"/>
    <text x="210" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">Gateway</text>
    <text x="210" y="235" text-anchor="middle" font-size="16" fill="#166534">Anthropic / OpenAI-compatible</text>
    <text x="210" y="260" text-anchor="middle" font-size="16" fill="#166534">files · messages · profiles</text>
    <rect x="360" y="168" width="240" height="118" rx="18" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="480" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#5b21b6">Agent Runtime</text>
    <text x="480" y="235" text-anchor="middle" font-size="16" fill="#5b21b6">query · session · compact</text>
    <text x="480" y="260" text-anchor="middle" font-size="16" fill="#5b21b6">permissions · team · workflow</text>
    <rect x="630" y="168" width="240" height="118" rx="18" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="750" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">Tool Runtime</text>
    <text x="750" y="235" text-anchor="middle" font-size="16" fill="#92400e">fs · shell · web · task</text>
    <text x="750" y="260" text-anchor="middle" font-size="16" fill="#92400e">ui · mcp · agent tools</text>
    <rect x="90" y="352" width="240" height="122" rx="18" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="210" y="388" text-anchor="middle" font-size="24" font-weight="700" fill="#0f766e">Local Storage</text>
    <text x="210" y="418" text-anchor="middle" font-size="16" fill="#0f766e">.hellox / ~/.hellox</text>
    <text x="210" y="442" text-anchor="middle" font-size="16" fill="#0f766e">sessions · memory · config</text>
    <rect x="360" y="352" width="240" height="122" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="480" y="388" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">Runtime Surfaces</text>
    <text x="480" y="418" text-anchor="middle" font-size="16" fill="#991b1b">workflow panels · selectors</text>
    <text x="480" y="442" text-anchor="middle" font-size="16" fill="#991b1b">history · diagnostics · telemetry</text>
    <rect x="630" y="352" width="240" height="122" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="750" y="388" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">Optional Integrations</text>
    <text x="750" y="418" text-anchor="middle" font-size="16" fill="#334155">bridge · server · remote seams</text>
    <text x="750" y="442" text-anchor="middle" font-size="16" fill="#334155">kept replaceable, not primary path</text>
    <path d="M210 118v40M480 118v40M750 118v40" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M210 286v44M480 286v44M750 286v44" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M330 228h28M600 228h28" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
